name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      # Go
      CGO_ENABLED: 0
      GOOS: linux
      GOARCH: ${{ matrix.arch == 'amd64' && 'amd64' || 'arm64' }}
      # Cargo / linker
      CARGO_BUILD_RUSTFLAGS: '-C strip=symbols'
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libclang-dev pkg-config

          if [ '${{ matrix.arch }}' = 'arm64' ]; then
            # Cross-compilation toolchain + sysroot
            sudo apt-get install -y --no-install-recommends \
              gcc-aarch64-linux-gnu \
              libc6-dev-arm64-cross
            # foreign libpcsclite for b25 cross-link
            sudo dpkg --add-architecture arm64
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              libpcsclite-dev:arm64
          else
            # Native b25 dep
            sudo apt-get install -y --no-install-recommends \
              libpcsclite-dev
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: isdbd/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            libaribb25-rs/target
          key: cargo-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'dvbr/Cargo.toml', 'arib-b24-rs/Cargo.toml', 'libaribb25-rs/Cargo.toml', 'libaribb25-rs/aribb25/Cargo.toml', 'libaribb25-rs/b25/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.arch }}-

      - name: 'Build dvbr (root workspace: dvbr + arib-b24)'
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          if [ '${{ matrix.arch }}' = 'arm64' ]; then
            cargo build --release --target aarch64-unknown-linux-gnu
          else
            cargo build --release --target x86_64-unknown-linux-gnu
          fi

      - name: 'Build b25 (inner workspace: libaribb25-rs)'
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PCSC_LIB_DIR: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu' || '' }}
        run: |
          if [ '${{ matrix.arch }}' = 'arm64' ]; then
            cargo build --release \
              --manifest-path libaribb25-rs/Cargo.toml \
              --target aarch64-unknown-linux-gnu
          else
            cargo build --release \
              --manifest-path libaribb25-rs/Cargo.toml \
              --target x86_64-unknown-linux-gnu
          fi

      - name: Build isdbd (Go daemon, CGO-free)
        env:
          GOARCH: ${{ matrix.arch == 'amd64' && 'amd64' || 'arm64' }}
        run: |
          cd isdbd
          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o ../isdbd \
            ./cmd/isdbd

      - name: Assemble release directory
        run: |
          TAG='${{ github.ref_name }}'
          RUST_TARGET='${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}'
          RELEASE_DIR="isdbd-${TAG}-linux-${{ matrix.arch }}"
          mkdir -p "$RELEASE_DIR"

          # binaries
          cp "target/${RUST_TARGET}/release/dvbr"  "$RELEASE_DIR/dvbr"
          cp "libaribb25-rs/target/${RUST_TARGET}/release/b25" "$RELEASE_DIR/b25"
          cp isdbd "$RELEASE_DIR/isdbd"

          # configs + systemd unit + readme
          cp -r isdbd/configs "$RELEASE_DIR/"
          cp isdbd/scripts/isdbd.service "$RELEASE_DIR/"
          cp README.md "$RELEASE_DIR/"

          # summary (don't run cross-compiled binaries — they won't exec on host)
          echo "isdbd ${TAG} — linux/${{ matrix.arch }}" > "$RELEASE_DIR/VERSION"
          echo "  dvbr  $(grep -m1 '^version' dvbr/Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$RELEASE_DIR/VERSION"
          echo "  b25   $(grep -m1 '^version' libaribb25-rs/b25/Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$RELEASE_DIR/VERSION"
          echo "  isdbd ${TAG}" >> "$RELEASE_DIR/VERSION"
          cat "$RELEASE_DIR/VERSION"

          chmod +x "$RELEASE_DIR/dvbr" "$RELEASE_DIR/b25" "$RELEASE_DIR/isdbd"

      - name: Package
        run: |
          TAG='${{ github.ref_name }}'
          RELEASE_DIR="isdbd-${TAG}-linux-${{ matrix.arch }}"
          tar czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: |
            isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
            isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: isdbd-${{ github.ref_name }}-linux-*
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## isdbd ${{ github.ref_name }}

            **ISDB-T self-hosted TV stack** — tuner (dvbr) + descrambler (b25) + daemon + web UI (isdbd).

            ### per-arch tarballs
            Each contains `isdbd`, `dvbr`, `b25`, example configs, and a systemd unit.

            | File | Arch |
            |------|------|
            | `isdbd-${{ github.ref_name }}-linux-amd64.tar.gz` | x86_64 |
            | `isdbd-${{ github.ref_name }}-linux-arm64.tar.gz` | aarch64 (Raspberry Pi 4/5, etc.) |

            ### install
            ```bash
            curl -L "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/isdbd-${{ github.ref_name }}-linux-amd64.tar.gz" | tar xz
            cd isdbd-${{ github.ref_name }}-linux-amd64
            sudo cp isdbd dvbr b25 /usr/local/bin/
            sudo mkdir -p /etc/isdbd && sudo cp configs/* /etc/isdbd/
            sudo cp isdbd.service /etc/systemd/system/
            ```

            ### requirements
            - Linux DVB adapter at `/dev/dvb/adapter*/`
            - `ffmpeg` / `ffprobe` on `$PATH`
            - For scrambled channels: `pcscd` + B-CAS card reader
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
