name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_RUSTFLAGS: '-C strip=symbols'

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      CGO_ENABLED: 0
      GOOS: linux
      GOARCH: ${{ matrix.arch == 'amd64' && 'amd64' || 'arm64' }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libclang-dev libpcsclite-dev pkg-config

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: isdbd/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            libaribb25-rs/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'dvbr/Cargo.toml', 'arib-b24-rs/Cargo.toml', 'libaribb25-rs/Cargo.toml', 'libaribb25-rs/aribb25/Cargo.toml', 'libaribb25-rs/b25/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Build dvbr (root workspace)
        run: cargo build --release

      - name: Build b25 (inner workspace)
        run: cargo build --release --manifest-path libaribb25-rs/Cargo.toml

      - name: Build isdbd (Go daemon)
        run: |
          cd isdbd
          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o ../isdbd \
            ./cmd/isdbd

      - name: Assemble release directory
        run: |
          TAG='${{ github.ref_name }}'
          RELEASE_DIR="isdbd-${TAG}-linux-${{ matrix.arch }}"
          mkdir -p "$RELEASE_DIR"

          cp target/release/dvbr                 "$RELEASE_DIR/dvbr"
          cp libaribb25-rs/target/release/b25    "$RELEASE_DIR/b25"
          cp isdbd                               "$RELEASE_DIR/isdbd"
          cp -r isdbd/configs                    "$RELEASE_DIR/"
          cp isdbd/scripts/isdbd.service         "$RELEASE_DIR/"
          cp README.md                           "$RELEASE_DIR/"

          chmod +x "$RELEASE_DIR/dvbr" "$RELEASE_DIR/b25" "$RELEASE_DIR/isdbd"

          # smoke-test the binaries (native arch — they run on the builder)
          echo "isdbd ${TAG} — linux/${{ matrix.arch }}" > "$RELEASE_DIR/VERSION"
          echo "  dvbr  $("$RELEASE_DIR/dvbr" --version 2>&1 | head -1 || echo "(version not printed)")" >> "$RELEASE_DIR/VERSION"
          echo "  b25   $("$RELEASE_DIR/b25" 2>&1 | head -1 || true)" >> "$RELEASE_DIR/VERSION"
          echo "  isdbd ${TAG}" >> "$RELEASE_DIR/VERSION"
          cat "$RELEASE_DIR/VERSION"

      - name: Package
        run: |
          TAG='${{ github.ref_name }}'
          RELEASE_DIR="isdbd-${TAG}-linux-${{ matrix.arch }}"
          tar czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: |
            isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
            isdbd-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: isdbd-${{ github.ref_name }}-linux-*
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## isdbd ${{ github.ref_name }}

            **ISDB-T self-hosted TV stack** — tuner (dvbr) + descrambler (b25) + daemon + web UI (isdbd).

            ### per-arch tarballs
            Each contains `isdbd`, `dvbr`, `b25`, example configs, and a systemd unit.

            | File | Arch |
            |------|------|
            | `isdbd-${{ github.ref_name }}-linux-amd64.tar.gz` | x86_64 |
            | `isdbd-${{ github.ref_name }}-linux-arm64.tar.gz` | aarch64 (Raspberry Pi 4/5, etc.) |

            ### install
            ```bash
            curl -L "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/isdbd-${{ github.ref_name }}-linux-amd64.tar.gz" | tar xz
            cd isdbd-${{ github.ref_name }}-linux-amd64
            sudo cp isdbd dvbr b25 /usr/local/bin/
            sudo mkdir -p /etc/isdbd && sudo cp configs/* /etc/isdbd/
            sudo cp isdbd.service /etc/systemd/system/
            ```

            ### requirements
            - Linux DVB adapter at `/dev/dvb/adapter*/`
            - `ffmpeg` / `ffprobe` on `$PATH`
            - For scrambled channels: `pcscd` + B-CAS card reader
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
